<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贴图文案 · 2026-06-11</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
    min-height: 100vh;
  }
  .container { max-width: 600px; width: 100%; }
  .date-header {
    text-align: center;
    font-size: 18px;
    font-weight: 700;
    color: #333;
    margin-bottom: 32px;
    letter-spacing: 0.5px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 28px 24px;
    margin-bottom: 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .card-title {
    font-size: 13px;
    color: #999;
    margin-bottom: 16px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .card-body {
    font-size: 17px;
    line-height: 1.8;
    color: #1a1a1a;
    font-weight: 500;
  }
  .card-tags {
    margin-top: 20px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .card-tag {
    display: inline-block;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    background: #f0f0f0;
    color: #666;
  }
  .card-tag.conflict {
    background: #fee2e2;
    color: #b91c1c;
  }
  .card-tag.social {
    background: #dbeafe;
    color: #1d4ed8;
  }
  .footer {
    text-align: center;
    font-size: 12px;
    color: #bbb;
    margin-top: 40px;
  }
  .footer a { color: #888; text-decoration: none; }
</style>
</head>
<body>
<div class="container">

  <div class="date-header">🗓 2026年6月11日</div>

  <!-- 卡片一 -->
  <div class="card">
    <div class="card-title">📌 深中通道 · 人情的第三次</div>
    <div class="card-body">
      人家约了你两次。<br>
      第一次你说不好意思，第二次你说下次。<br>
      第三次他没有再叫你。<br><br>
      不是你不想去。是你教会了他——不用再叫了。<br><br>
      人情凉得比你想象的快。
    </div>
    <div class="card-tags">
      <span class="card-tag conflict">人情断联</span>
      <span class="card-tag social">社交边界</span>
      <span class="card-tag">拒绝代价</span>
    </div>
  </div>

  <!-- 卡片二 -->
  <div class="card">
    <div class="card-title">📌 门槛认知偏差 · 你操的什么心</div>
    <div class="card-body">
      你天天操心怎么涨到一百粉。<br>
      终于一百了——发现平台把什么都给你备好了。<br><br>
      返佣系统、产品库、自动结算。<br>
      你之前操心的那些问题，一个都对不上。<br><br>
      在楼下操心楼上的事，想出来的全是错的。<br>
      不在那个层，你操的什么心。
    </div>
    <div class="card-tags">
      <span class="card-tag conflict">认知偏差</span>
      <span class="card-tag social">阶段幻觉</span>
      <span class="card-tag">行动优先</span>
    </div>
  </div>

  <div class="footer">
    <a href="index.html">← 返回索引</a>
  </div>

</div>
</body>
</html>
