  <div class="source">旁观者为什么不帮忙</div>
  <div class="body">
    牌桌上吵起来了。旁边天天打牌的人，我说过来帮看一眼。不来，说不会。<br><br>
    回来的路上我问朋友：换成你，去不去？<br>
    他说肯定去。<br>
    我问那他们为什么不去？他说怕麻烦。<br>
    我又问：那你现在呢？<br>
    他想了一下：好像也得考虑考虑。
  </div>
  <span class="tag">社交退缩</span>
</div>

<div class="card">
  <div class="source">成年人的反差吸引力</div>
  <div class="body">
    成年男人只喜欢两种女人：有少女感的少妇，有少妇感的少女。<br><br>
    成年女人只喜欢两种男人：有少年感的大叔，爹系的少年。<br><br>
    你说这是两性偏好？不是。<br>
    人从来不是在找一种类型，是在找一个人身上的两种样子。
  </div>
