  <div class="body">你睡前灵感喷涌，觉得全想通了。

第二天打开空白文档——又一个字写不出来。

不是你不会写。是你那些想法从来没有落过地。
脑子里的东西是飘的。你没跟自己说过话，直接就想写成文章。

少了一层。说出来，写下来，才到你手上。</div>

</div>

但你127粉的时候，没有任何陌生人会主动找你。

不是因为你圈子不够大。
是因为你还没到那个层级——到了，贵人才看得见你。</div>
  <div class="conflict">四处找 ≠ 对的人会来 · 层级到了自然相遇</div>
